version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beetlex-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beetlex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beetlex"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: beetlex-api
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/beetlex?schema=public

volumes:
  postgres_data:
